  postgres:
    image: paradedb/paradedb:v0.22.2-pg17
    container_name: metanote-postgres
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-knowhow}
    volumes:
      - metanote-postgres-data:/var/lib/postgresql/data
    networks:
      - metanote-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 1m
    restart: unless-stopped

  redis:
    image: redis:7.0-alpine
    container_name: metanote-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-metanote-redis-local}
    volumes:
      - metanote-redis-data:/data
    networks:
      - metanote-network
    restart: unless-stopped

  docreader:
    # 镜像: 本地开发使用 local tag，生产使用 ACR 镜像 (通过 docker-compose.prod.yml 覆盖)
    # 构建: 定义在 docker-compose.override.yml (本地开发) 或 acr-push.sh (Mac -> ACR)
    platform: linux/amd64
    image: ${DOCREADER_IMAGE:-metanote/weknora-docreader:${WEKNORA_VERSION:-local}}
    container_name: metanote-docreader
    ports:
      - "${DOCREADER_PORT:-50051}:50051"
    volumes:
      - metanote-docreader-tmp:/tmp/docreader
    environment:
      DOCREADER_IMAGE_OUTPUT_DIR: /tmp/docreader
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-50}
      MINERU_ENDPOINT: ${MINERU_ENDPOINT:-}
      # Object storage (same credentials as minio service; internal DNS for uploads from docreader)
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: http://127.0.0.1:${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY_ID:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_ACCESS_KEY:-minioadmin}
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - metanote-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: metanote-minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_ACCESS_KEY:-minioadmin}
    command: server --console-address ":9001" /data
    volumes:
      - metanote-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - metanote-network
    restart: unless-stopped

  # milvus:
  #   image: milvusdb/milvus:v2.6.11
  #   container_name: metanote-milvus
  #   security_opt:
  #     - seccomp:unconfined
  #   command: ["milvus", "run", "standalone"]
  #   environment:
