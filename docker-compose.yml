 # Sandbox 镜像：仅用于 build/pull，非常驻服务；app 执行 Skills 时按需 docker run 该镜像，用毕即释
  sandbox:
    image: wechatopenai/weknora-sandbox:${WEKNORA_VERSION:-latest}
    container_name: metanote-sandbox
    build:
      context: .
      dockerfile: docker/Dockerfile.sandbox
    profiles:
      - full
    command: ["true"]
    restart: "no"

  neo4j:
    image: neo4j:2025.10.1
    container_name: metanote-neo4j
    volumes:
      - metanote-neo4j-data:/data
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4JLABS_PLUGINS=["apoc"]
    ports:
      - "7474:7474"
      - "7687:7687"
    restart: always
    networks:
      - metanote-network
    profiles:
      - neo4j
      - full
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: metanote-jaeger-dev
    ports:
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
      - "14250:14250"
      - "14268:14268"
      - "9411:9411"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    volumes:
      - metanote-jaeger-data:/var/lib/jaeger
    networks:
      - metanote-network
    restart: unless-stopped
    profiles:
      - jaeger
      - full


    
networks:
  metanote-network:
    driver: bridge

volumes:
  metanote-postgres-data:
  metanote-redis-data:
  metanote-docreader-tmp:
  metanote-minio-data:
  metanote-milvus-data:
  metanote-notex-data:
  metanote-jaeger-data:
  metanote-neo4j-data: