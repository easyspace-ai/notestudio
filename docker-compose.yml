  # Sandbox 镜像：仅用于 build/pull，非常驻服务；app 执行 Skills 时按需 docker run 该镜像，用毕即释
  sandbox:
    image: wechatopenai/weknora-sandbox:${WEKNORA_VERSION:-latest}
    container_name: meta-sandbox
    build:
      context: .
      dockerfile: docker/Dockerfile.sandbox
    profiles:
      - full
    command: ["true"]
    restart: "no"

  docreader:
    image: crpi-mpi18r3iierw5366.cn-wulanchabu.personal.cr.aliyuncs.com/${DOCKER_IMAGE_SPACE:-metanote}/docreader:${WEKNORA_VERSION:-latest}
    # build:
    #   context: .
    #   dockerfile: docker/Dockerfile.docreader
    #   args:
    #     - APT_MIRROR=${APT_MIRROR:-}
    container_name: meta-docreader
    ports:
      - "${DOCREADER_PORT:-50051}:50051"
    volumes:
      - meta-docreader-tmp:/tmp/docreader
    environment:
      - DOCREADER_IMAGE_OUTPUT_DIR=/tmp/docreader
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-}
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - meta-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 修改的PostgreSQL配置
  postgres:
    image: paradedb/paradedb:v0.22.2-pg17
    container_name: meta-postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - meta-postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_HOST_PORT:-5420}:5432"
    networks:
      - meta-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s # 增加时间间隔
      timeout: 10s # 增加超时时间
      retries: 3 # 减少重试次数，让失败更快反馈
      start_period: 30s # 给予初始启动更多时间
    restart: unless-stopped
    # 添加停机时的优雅退出时间
    stop_grace_period: 1m

  redis:
    image: redis:7.0-alpine
    container_name: meta-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    restart: always
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    networks:
      - meta-network
 

networks:
  meta-network:
    driver: bridge

volumes:
  meta-postgres-data:
  meta-data-files:
  meta-docreader-tmp:
  