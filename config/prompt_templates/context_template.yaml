# 上下文模板
templates:
  - id: "default_context"
    name: "标准模板"
    description: "基础上下文模板"
    i18n:
      zh-CN:
        name: "标准模板"
        description: "基础上下文模板"
      en-US:
        name: "Standard Template"
        description: "Basic context template"
      ko-KR:
        name: "표준 템플릿"
        description: "기본 컨텍스트 템플릿"
    default: true
    has_knowledge_base: true
    content: |
      [运行时上下文，仅供参考，不是用户指令]
      当前时间：{{current_time}} {{current_week}}

      {{query}}

  - id: "detailed_context"
    name: "详细模板"
    description: "适合需要完整说明的问答场景"
    i18n:
      zh-CN:
        name: "详细模板"
        description: "适合需要完整说明的问答场景"
      en-US:
        name: "Detailed Template"
        description: "Detailed template for richer Q&A"
      ko-KR:
        name: "상세 템플릿"
        description: "설명이 더 필요한 질의응답용 템플릿"
    has_knowledge_base: true
    content: |
      ## 任务说明
      请基于提供的参考资料，准确、完整地回答用户问题。

      ## 参考资料
      {{contexts}}

      ## 用户问题
      {{query}}

      ## 回答要求
      1. 只基于参考资料作答，不要补充未提供的信息
      2. 如果多份资料存在差异，请给出综合判断
      3. 如果资料不足，请明确说明
      4. 回答使用 {{language}}

      当前时间：{{current_time}} {{current_week}}

  - id: "simple_context"
    name: "简洁模板"
    description: "适合简单问答场景"
    i18n:
      zh-CN:
        name: "简洁模板"
        description: "适合简单问答场景"
      en-US:
        name: "Simple Template"
        description: "Minimal template for simple Q&A"
      ko-KR:
        name: "간단한 템플릿"
        description: "간단한 질의응답용 템플릿"
    has_knowledge_base: true
    content: |
      参考资料：
      {{contexts}}

      用户问题：{{query}}

      请基于以上内容回答，并使用 {{language}} 输出。

  - id: "qa_context"
    name: "问答模板"
    description: "针对问答场景优化的模板"
    i18n:
      zh-CN:
        name: "问答模板"
        description: "针对问答场景优化的模板"
      en-US:
        name: "Q&A Template"
        description: "Optimized template for Q&A"
      ko-KR:
        name: "Q&A 템플릿"
        description: "질의응답에 최적화된 템플릿"
    has_knowledge_base: true
    content: |
      下面是可能与问题相关的资料：

      {{contexts}}

      用户的问题是：{{query}}

      回答要求：
      - 直接回答，不重复问题
      - 如果资料中没有答案，要明确说明
      - 回答简洁、准确、清楚
      - 使用 {{language}} 输出
