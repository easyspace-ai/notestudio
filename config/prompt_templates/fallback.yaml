# 兜底模板
# 包含固定回复模板和模型兜底提示模板
templates:
  - id: "default_fallback"
    name: "标准兜底"
    description: "无法命中资料时的默认回复"
    i18n:
      zh-CN:
        name: "标准兜底"
        description: "无法命中资料时的默认回复"
      en-US:
        name: "Standard Fallback"
        description: "Default fallback response"
      ko-KR:
        name: "표준 폴백"
        description: "기본 폴백 응답"
    default: true
    content: |
      抱歉，我暂时没有在当前资料中找到能直接回答你问题的内容。

      你可以尝试：
      1. 换一种说法重新提问
      2. 提供更具体的关键词、文件名或背景信息
      3. 把问题拆成更小、更明确的几个点

      如果你愿意，我也可以继续帮你一起梳理问题。

      请使用 {{language}} 输出。

  - id: "polite_fallback"
    name: "礼貌兜底"
    description: "更柔和、更详细的兜底回复"
    i18n:
      zh-CN:
        name: "礼貌兜底"
        description: "更柔和、更详细的兜底回复"
      en-US:
        name: "Polite Fallback"
        description: "More polite fallback response"
      ko-KR:
        name: "정중한 폴백"
        description: "조금 더 자세하고 정중한 폴백 응답"
    content: |
      抱歉，我目前还无法基于现有资料给出足够准确的回答。

      可能的原因包括：
      - 相关内容尚未收录到资料中
      - 当前问题描述还不够具体
      - 现有资料与问题关联较弱

      建议你：
      1. 更换关键词重新提问
      2. 说明具体对象、时间范围或场景
      3. 提供更明确的文件或主题线索

      请使用 {{language}} 输出。

  - id: "brief_fallback"
    name: "简洁兜底"
    description: "更短的兜底回复"
    i18n:
      zh-CN:
        name: "简洁兜底"
        description: "更短的兜底回复"
      en-US:
        name: "Brief Fallback"
        description: "Short fallback response"
      ko-KR:
        name: "간단한 폴백"
        description: "짧은 폴백 응답"
    content: |
      抱歉，当前资料还不足以回答这个问题。你可以换个说法，或补充更多背景信息后再试一次。

  - id: "model_fallback"
    name: "模型兜底提示"
    description: "当选择模型兜底策略时使用的提示词"
    i18n:
      zh-CN:
        name: "模型兜底提示"
        description: "当选择模型兜底策略时使用的提示词"
      en-US:
        name: "Model Fallback Prompt"
        description: "Prompt for model fallback mode"
      ko-KR:
        name: "모델 폴백 프롬프트"
        description: "모델 폴백 모드에서 사용하는 프롬프트"
    mode: "model"
    content: |
      你是 MetaNote 的智能助手。当前知识库没有命中能够直接回答用户问题的内容。

      请基于你的通用知识尽力提供一个有帮助、清楚、克制的回答，并遵守以下要求：
      - 明确区分“确定信息”和“可能信息”
      - 不要假装自己已经查到资料
      - 如果内容具有时效性或不确定性，要主动提醒用户
      - 如果更适合继续检索，也可以建议用户补充线索后再查
      - 全部使用 {{language}} 输出
