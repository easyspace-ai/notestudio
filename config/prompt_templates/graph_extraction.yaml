# 知识图谱抽取模板
templates:
  - id: "default_extract_entities"
    name: "实体抽取"
    description: "从文本中抽取知识图谱实体"
    default: true
    content: |
      ## 任务
      从用户提供的文本中抽取实体，用于构建知识图谱。

      实体类型只能从下面列表中选择：
      [Person, Organization, Location, Product, Event, Date, Work, Concept, Resource, Category, Operation]

      ## 输出要求
      1. 只输出 JSON 数组
      2. 每个实体对象至少包含 `title` 和 `type`
      3. `description` 可选，但强烈建议提供
      4. `type` 必须严格来自给定类型列表，不能自造
      5. 无法明确判断类型时，宁可跳过，不要强行归类
      6. 所有字段都不能包含 HTML 或代码片段
      7. 如果没有找到实体，返回 `[]`

      ## 抽取规则
      - Person：人物，包括真实人物、虚构人物、历史人物
      - Organization：组织、公司、机构、学校、团队、家族
      - Location：地理位置、国家、城市、地点、地标
      - Product：产品、服务、品牌、系统
      - Event：事件、会议、活动、历史事件
      - Date：日期、时间段、时代
      - Work：书籍、论文、影视、音乐、艺术作品
      - Concept：抽象概念、理论、观点、方法论
      - Resource：资源、工具、平台、数据、材料
      - Category：类别、领域、分类
      - Operation：动作、流程、方法、操作

      ## 字段要求
      - `title`：实体的标准名称，去掉无关修饰
      - `type`：实体类型
      - `description`：基于原文写一句简洁描述，使用 {{language}}

      ## 输出示例
      [
        {
          "title": "MetaNote",
          "type": "Product",
          "description": "一个用于资料问答和内容分析的智能系统"
        }
      ]

  - id: "default_extract_relationships"
    name: "关系抽取"
    description: "从文本中抽取实体关系"
    default: true
    content: |
      ## 任务
      根据文本内容和已抽取的实体数组，提取实体之间在原文中明确出现的关系。

      ## 输出要求
      1. 只输出 JSON 数组
      2. 每个关系对象必须包含 `source`、`target`、`description`、`strength`
      3. 关系必须有原文依据，不能编造
      4. `source` 和 `target` 必须来自已有实体
      5. 如果没有关系，返回 `[]`

      ## strength 评分参考
      - 10：直接创建、从属、作者与作品、母子公司等强关系
      - 9：同一实体的别名、旧名等高度等价关系
      - 8：高度相关、强联系关系，例如亲属、核心协作、明确对立
      - 7：明确但间接的关系，例如角色属于作品、成员属于组织
      - 6：有清晰联系但不是核心关系
      - 5：相关但连接较弱

      ## 抽取原则
      - 只保留原文明确表达的关系
      - `description` 要简洁准确，使用 {{language}}
      - 如果关系是单向的，只保留单向关系
      - 如果关系天然双向，可以根据语义决定是否同时输出反向关系
      - 不要输出互相矛盾的关系

      ## 输出示例
      [
        {
          "source": "张三",
          "target": "MetaNote",
          "description": "张三是 MetaNote 项目的负责人",
          "strength": 8
        }
      ]
